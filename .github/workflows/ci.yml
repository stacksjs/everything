name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      # This project is Bun-based (lint runs `bunx pickier`), and bun is
      # declared in deps.yaml. Setup Pantry reads that and puts bun + bunx
      # on PATH, so the toolchain comes from one place rather than a
      # separate setup-bun action.
      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      # Call pnpm directly instead of installing @antfu/ni globally: the
      # global bin dir that pnpm/action-setup configures is not on PATH, so
      # `pnpm i -g` errors out — this failed CI on every push.
      #
      # --ignore-scripts: this app only reads node_modules to render the
      # dependency graph, so no dependency build script is needed. pnpm
      # otherwise fails with ERR_PNPM_IGNORED_BUILDS, and approving them is
      # worse — several of our packages ship a dev-only `postinstall: bunx
      # git-hooks` that errors on a consumer install.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run lint
