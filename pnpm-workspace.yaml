packages: []

# Every actively-maintained, publicly-published package created by the Stacks
# team, grouped into catalogs. The catalog names double as the cluster labels in
# node-modules-inspector (defaultSettings.dependenciesGroupBy: 'catalog').
#
# Only packages that resolve to a Stacks-owned name on the public npm registry
# are listed here — private/unpublished libs (most zig-*, the audio/video/maps
# sub-scopes, nps-fonts, template repos) and third-party look-alikes squatting a
# short name are intentionally excluded so the graph stays 100% "ours".
catalogs:
  # ── Stacks framework — the @stacksjs/* monorepo (storage/framework/core) ──
